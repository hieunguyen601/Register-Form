<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="resources/favicon.ico" type="image/x-icon" sizes="96x96">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet">
    <title>Multi-step Register Form</title>
  </head>
  <body>
    <img id="blur" src="./resources/blur-radial.png" alt="">
    <form class="mainForm" id="step1Form">
      <p id="title">Register</p>
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" autocomplete="off">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Example@gmail.com" autocomplete="off">
      <button type="submit" id="continueBtn">Continue</button>
    </form>
    <p id="step">
      Step <span id="pageNumber">1</span> of 3
      <span class="step-dots">
        <span class="dot active"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </span>
    </p>
    <script src="./script.js"></script>
  </body>
</html>
